<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Saathi — Course Player</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
:root{
  --brand:#E8611A;--brand-glow:rgba(232,97,26,0.3);
  --gold:#F0A500;--gold-light:#FFD166;
  --forest:#1B5E3B;--forest-pale:#E8F5EE;
  --ink:#0E0D12;--ink2:#1C1B24;
  --muted:#888599;--border:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--ink);color:white;display:flex;flex-direction:column;}

/* NAV */
.player-nav{
  background:var(--ink2);border-bottom:2px solid rgba(255,255,255,0.06);
  padding:0 12px;flex-shrink:0;z-index:200;
  height:52px;display:flex;align-items:center;gap:8px;
}
.nav-home{font-size:16px;text-decoration:none;opacity:0.5;transition:opacity .2s;flex-shrink:0;}
.nav-home:hover{opacity:1;}
.nav-back{
  background:transparent;border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6);font-size:12px;font-weight:700;padding:6px 10px;
  border-radius:6px;cursor:pointer;white-space:nowrap;flex-shrink:0;text-decoration:none;
  transition:all .2s;
}
.nav-back:hover{border-color:rgba(255,255,255,0.35);color:white;}
.nav-title{font-weight:700;font-size:13px;color:white;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-module-tag{font-size:11px;color:var(--gold);background:rgba(240,165,0,0.12);border:1px solid rgba(240,165,0,0.2);padding:4px 9px;border-radius:12px;flex-shrink:0;white-space:nowrap;}

/* PROGRESS STRIP */
.progress-strip{height:3px;background:rgba(255,255,255,0.07);flex-shrink:0;}
.progress-strip-fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--gold));transition:width .5s ease;}

/* MODULE TABS */
.module-tabs{
  background:#111320;border-bottom:1px solid rgba(255,255,255,0.05);
  flex-shrink:0;overflow-x:auto;display:flex;align-items:stretch;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.module-tabs::-webkit-scrollbar{display:none;}
.mod-tab{
  padding:9px 12px;font-size:11px;font-weight:700;letter-spacing:.3px;
  color:rgba(255,255,255,0.3);cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;transition:all .2s;flex-shrink:0;
  display:flex;align-items:center;gap:5px;
}
.mod-tab:hover{color:rgba(255,255,255,0.65);}
.mod-tab.active{color:white;border-bottom-color:var(--brand);}
.mod-tab.done{color:var(--forest-pale) !important;}
.tab-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.12);flex-shrink:0;}
.mod-tab.done .tab-dot{background:var(--forest);}
.mod-tab.active .tab-dot{background:var(--brand);}

/* CONTENT */
.content-area{flex:1;position:relative;overflow:hidden;}
.module-frame{width:100%;height:100%;border:none;background:white;}

/* LOADING */
.frame-loading{
  position:absolute;inset:0;background:var(--ink);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  z-index:10;transition:opacity .3s;
}
.frame-loading.hidden{opacity:0;pointer-events:none;}
.loading-spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:rgba(255,255,255,0.4);}

/* LOCKED OVERLAY */
.locked-overlay{
  position:absolute;inset:0;
  background:rgba(10,10,20,0.97);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:28px;z-index:50;
}
.locked-overlay.show{display:flex;}
.lock-icon{font-size:56px;margin-bottom:18px;}
.lock-title{font-weight:800;font-size:22px;margin-bottom:8px;}
.lock-sub{color:rgba(255,255,255,0.55);font-size:14px;max-width:300px;margin-bottom:24px;line-height:1.6;}
.lock-btn{background:var(--brand);color:white;font-weight:800;font-size:15px;padding:14px 32px;border-radius:10px;text-decoration:none;box-shadow:0 6px 24px var(--brand-glow);}

/* CONTROLS */
.player-controls{
  background:#111320;border-top:1px solid rgba(255,255,255,0.06);
  padding:9px 12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.ctrl-btn{
  display:flex;align-items:center;gap:5px;padding:9px 14px;
  border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;
  border:none;transition:all .2s;text-decoration:none;white-space:nowrap;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.ctrl-prev{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);}
.ctrl-prev:hover:not(:disabled){background:rgba(255,255,255,0.12);color:white;}
.ctrl-prev:disabled{opacity:0.3;cursor:not-allowed;}
.ctrl-complete{background:var(--forest);color:white;flex:1;justify-content:center;max-width:180px;}
.ctrl-complete:hover{background:#1f7a48;}
.ctrl-complete.already-done{background:rgba(27,94,59,0.25);color:rgba(255,255,255,0.4);cursor:default;}
.ctrl-next{background:var(--brand);color:white;}
.ctrl-next:hover:not(:disabled){background:#C0470D;}
.ctrl-next:disabled{opacity:0.3;cursor:not-allowed;}

/* TOAST */
.toast{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--forest);color:white;
  padding:11px 20px;border-radius:10px;font-size:13px;font-weight:700;
  opacity:0;transition:all .3s;z-index:500;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Mobile label hide */
@media(max-width:400px){
  .nav-title{display:none;}
  .ctrl-complete span{display:none;}
}





/* ── TRANSLATE ── */
.tr-btn{
  position:fixed;bottom:68px;right:14px;z-index:400;
  background:#1C1B24;border:1.5px solid rgba(255,255,255,0.18);
  border-radius:50px;padding:9px 15px;
  display:flex;align-items:center;gap:8px;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);transition:all .2s;
  font-family:'Plus Jakarta Sans',sans-serif;user-select:none;
}
.tr-btn:hover{border-color:var(--brand);}
.tr-btn-icon{font-size:17px;line-height:1;}
.tr-btn-text{font-size:12px;font-weight:700;color:rgba(255,255,255,0.85);white-space:nowrap;}

.tr-menu{
  position:fixed;bottom:115px;right:14px;z-index:400;
  background:#1C1B24;border:1.5px solid rgba(255,255,255,0.1);
  border-radius:14px;overflow:hidden;min-width:190px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  opacity:0;pointer-events:none;transform:translateY(8px);
  transition:opacity .2s,transform .2s;
}
.tr-menu.open{opacity:1;pointer-events:all;transform:translateY(0);}
.tr-menu-head{font-size:10px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;
  color:rgba(255,255,255,0.28);padding:12px 16px 6px;}
.tr-opt{
  padding:11px 16px;display:flex;align-items:center;gap:11px;
  cursor:pointer;transition:background .12s;
}
.tr-opt:hover{background:rgba(255,255,255,0.07);}
.tr-opt.sel{background:rgba(232,97,26,0.15);}
.tr-opt-flag{font-size:20px;flex-shrink:0;}
.tr-opt-name{font-size:14px;font-weight:600;color:white;}
.tr-opt-native{font-size:12px;color:rgba(255,255,255,0.38);margin-left:auto;}

</style>
</head>
<body>

<nav class="player-nav">
  <a href="index.html" class="nav-home" title="Home">🏠</a>
  <a href="dashboard.html" class="nav-back">← Dashboard</a>
  <div class="nav-title" id="navTitle">Loading...</div>
  <div class="nav-module-tag" id="navTag">M1 / 8</div>
</nav>

<div class="progress-strip">
  <div class="progress-strip-fill" id="progressStrip" style="width:0%"></div>
</div>

<div class="module-tabs" id="moduleTabs"></div>

<div class="content-area">
  <div class="frame-loading" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">Module load हुँदैछ...</div>
  </div>

  <div class="locked-overlay" id="lockedOverlay">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">यो module locked छ</div>
    <div class="lock-sub">Course किन्नुहोस् र सबै ८ modules को lifetime access पाउनुहोस्।</div>
    <a href="payment.html" class="lock-btn">रू. ९९९ मा Unlock गर्नुहोस् →</a>
  </div>

  <iframe id="moduleFrame" class="module-frame" title="Course Module"></iframe>
</div>

<div class="player-controls">
  <button class="ctrl-btn ctrl-prev" id="btnPrev" onclick="navigate(-1)">← पहिले</button>
  <button class="ctrl-btn ctrl-complete" id="btnComplete" onclick="markComplete()">
    ✅ <span>Complete गरियो</span>
  </button>
  <button class="ctrl-btn ctrl-next" id="btnNext" onclick="navigate(1)">अर्को →</button>
</div>

<div class="toast" id="toast"></div>

<script>
const MODULES = [
  {id:1, title:"AI Saathi: Your Smart Life, Simplified",     short:"Foundations",    file:"modules/AI_Saathi_Module1_Complete.html"},
  {id:2, title:"The Writing Superpower",                     short:"Writing",        file:"modules/AI_Course_Module2_Nepal.html"},
  {id:3, title:"ChatGPT for Daily Life & Business",          short:"Daily Life",     file:"modules/AI_Course_Module3_Nepal.html"},
  {id:4, title:"Making Money with AI",                       short:"Earn Money",     file:"modules/AI_Course_Module4_Nepal.html"},
  {id:5, title:"AI Images, Video & Voice",                   short:"Creative",       file:"modules/AI_Course_Module5_Nepal.html"},
  {id:6, title:"Research, Data & Smarter Decisions",         short:"Research",       file:"modules/AI_Course_Module6_Nepal.html"},
  {id:7, title:"Advanced Prompting & Automation",            short:"Prompting",      file:"modules/AI_Course_Module7_Nepal (1).html"},
  {id:8, title:"Your AI Future",                             short:"Future",         file:"modules/AI_Course_Module8_Nepal (1).html"},
];

function getProgress(){
  try{ return JSON.parse(localStorage.getItem('ai_saathi_progress')) || {completed:[],started:[]}; }
  catch(e){ return {completed:[],started:[]}; }
}
function saveProgress(p){ localStorage.setItem('ai_saathi_progress', JSON.stringify(p)); }

function getModuleId(){
  const id = parseInt(new URLSearchParams(window.location.search).get('module'));
  return (id >= 1 && id <= 8) ? id : 1;
}

let currentModuleId = getModuleId();
let hasPaid = false;
let currentUser = null;

// ── Firebase Auth Guard ──
window.auth.onAuthStateChanged(async (user) => {
  if(!user){
    // Not logged in → go to login, return here after
    window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.href);
    return;
  }
  currentUser = user;

  try {
    const doc = await window.db.collection('users').doc(user.uid).get();
    const data = doc.exists ? doc.data() : {};
    hasPaid = data.hasPaid === true;
    
    // Store for UI use
    localStorage.setItem('ai_saathi_user', JSON.stringify({...data, name: data.name || user.displayName || user.email.split('@')[0], hasPaid: hasPaid}));
  } catch(e) {
    console.error(e);
  }

  buildTabs();
  loadModule(currentModuleId);
});

function buildTabs(){
  const prog = getProgress();
  const tabs = document.getElementById('moduleTabs');
  tabs.innerHTML = '';
  MODULES.forEach(mod => {
    const isDone = prog.completed.includes(mod.id);
    const isActive = mod.id === currentModuleId;
    const canAccess = hasPaid || mod.id === 1;

    const tab = document.createElement('div');
    tab.className = `mod-tab${isActive?' active':''}${isDone?' done':''}`;
    if(!canAccess) tab.style.opacity = '0.3';
    tab.innerHTML = `<span class="tab-dot"></span>M${mod.id}: ${mod.short}${isDone?' ✓':''}`;
    if(canAccess) tab.onclick = () => loadModule(mod.id);
    else tab.title = 'Unlock to access';
    tabs.appendChild(tab);
  });

  const activeTab = tabs.querySelector('.active');
  if(activeTab) activeTab.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
}

function loadModule(moduleId){
  const canAccess = hasPaid || moduleId === 1;
  const mod = MODULES.find(m => m.id === moduleId);
  if(!mod) return;

  currentModuleId = moduleId;

  const url = new URL(window.location);
  url.searchParams.set('module', moduleId);
  window.history.replaceState({}, '', url);

  document.getElementById('navTitle').textContent = mod.title;
  document.getElementById('navTag').textContent = `M${moduleId} / 8`;

  if(!canAccess){
    document.getElementById('lockedOverlay').classList.add('show');
    document.getElementById('moduleFrame').src = '';
    updateControls();
    buildTabs();
    return;
  }

  document.getElementById('lockedOverlay').classList.remove('show');
  document.getElementById('loadingScreen').classList.remove('hidden');

  const frame = document.getElementById('moduleFrame');
  frame.onload = () => {
    document.getElementById('loadingScreen').classList.add('hidden');
    const prog = getProgress();
    if(!prog.started.includes(moduleId) && !prog.completed.includes(moduleId)){
      prog.started.push(moduleId);
      saveProgress(prog);
    }
    updateProgressStrip();
  };
  frame.src = mod.file;

  updateControls();
  buildTabs();
  updateProgressStrip();
}

function updateControls(){
  const prog = getProgress();
  const isDone = prog.completed.includes(currentModuleId);

  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const btnComplete = document.getElementById('btnComplete');

  btnPrev.disabled = currentModuleId === 1;
  btnNext.disabled = currentModuleId === 8 || (!hasPaid && currentModuleId >= 1);

  if(isDone){
    btnComplete.innerHTML = '✅ Completed!';
    btnComplete.classList.add('already-done');
    btnComplete.disabled = true;
  } else {
    btnComplete.innerHTML = '✅ <span>Complete गरियो</span>';
    btnComplete.classList.remove('already-done');
    btnComplete.disabled = false;
  }
}

function updateProgressStrip(){
  const prog = getProgress();
  const pct = Math.round((prog.completed.length / 8) * 100);
  document.getElementById('progressStrip').style.width = pct + '%';
}

function navigate(direction){
  const newId = currentModuleId + direction;
  if(newId < 1 || newId > 8) return;

  // Check access
  if(!hasPaid && newId > 1){
    showToast('🔒 Course unlock गर्नुहोस्!');
    setTimeout(() => { window.location.href = 'payment.html'; }, 1500);
    return;
  }

  loadModule(newId);
  window.scrollTo(0,0);
}

function markComplete(){
  const prog = getProgress();
  if(prog.completed.includes(currentModuleId)) return;

  prog.completed.push(currentModuleId);
  prog.started = prog.started.filter(id => id !== currentModuleId);
  saveProgress(prog);

  const isLast = currentModuleId === 8;
  showToast(isLast
    ? '🎓 Course complete! Certificate तयार छ!'
    : `✅ Module ${currentModuleId} complete! अर्को module सुरु गर्नुस्।`
  );

  updateControls();
  buildTabs();
  updateProgressStrip();

  // Save to Firebase
  if(currentUser){
    window.db.collection('users').doc(currentUser.uid).update({
      completed: firebase.firestore.FieldValue.arrayUnion(currentModuleId)
    }).catch(e => console.error('Progress save error:', e));
  }

  if(!isLast){
    setTimeout(() => navigate(1), 2200);
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>



<!-- ── TRANSLATE UI ── -->
<div class="tr-menu" id="trMenu">
  <div class="tr-menu-head">भाषा छान्नुहोस्</div>
  <div class="tr-opt sel" data-lang="en"   data-flag="🌐" data-label="English"  onclick="applyLang(this)"><span class="tr-opt-flag">🇺🇸</span><span class="tr-opt-name">English</span><span class="tr-opt-native">English</span></div>
  <div class="tr-opt"     data-lang="ne"   data-flag="🇳🇵" data-label="नेपाली"  onclick="applyLang(this)"><span class="tr-opt-flag">🇳🇵</span><span class="tr-opt-name">Nepali</span><span class="tr-opt-native">नेपाली</span></div>
  <div class="tr-opt"     data-lang="hi"   data-flag="🇮🇳" data-label="हिन्दी"  onclick="applyLang(this)"><span class="tr-opt-flag">🇮🇳</span><span class="tr-opt-name">Hindi</span><span class="tr-opt-native">हिन्दी</span></div>
  <div class="tr-opt"     data-lang="zh-CN" data-flag="🇨🇳" data-label="中文"   onclick="applyLang(this)"><span class="tr-opt-flag">🇨🇳</span><span class="tr-opt-name">Chinese</span><span class="tr-opt-native">中文</span></div>
  <div class="tr-opt"     data-lang="ar"   data-flag="🇸🇦" data-label="العربية" onclick="applyLang(this)"><span class="tr-opt-flag">🇸🇦</span><span class="tr-opt-name">Arabic</span><span class="tr-opt-native">العربية</span></div>
  <div class="tr-opt"     data-lang="ja"   data-flag="🇯🇵" data-label="日本語"  onclick="applyLang(this)"><span class="tr-opt-flag">🇯🇵</span><span class="tr-opt-name">Japanese</span><span class="tr-opt-native">日本語</span></div>
</div>

<div class="tr-btn" id="trBtn" onclick="toggleTrMenu()">
  <span class="tr-btn-icon" id="trFlag">🌐</span>
  <span class="tr-btn-text" id="trLabel">Translate</span>
</div>

<script>
// ── Google Translate widget (hidden) — translates THIS page's chrome ──
(function(){
  window.googleTranslateElementInit = function(){
    new google.translate.TranslateElement({
      pageLanguage:'en', autoDisplay:false
    },'_gt_host');
  };
  var s = document.createElement('script');
  s.src = 'https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit';
  s.async = true;
  document.head.appendChild(s);
})();
</script>
<div id="_gt_host" style="display:none;"></div>

<script>
var trOpen = false;
var activeLang = 'en';

function toggleTrMenu(){
  trOpen = !trOpen;
  document.getElementById('trMenu').classList.toggle('open', trOpen);
}

document.addEventListener('click', function(e){
  if(!e.target.closest('#trBtn') && !e.target.closest('#trMenu')){
    trOpen = false;
    document.getElementById('trMenu').classList.remove('open');
  }
});

function applyLang(el){
  var lang  = el.dataset.lang;
  var flag  = el.dataset.flag;
  var label = el.dataset.label;

  activeLang = lang;

  // Update button
  document.getElementById('trFlag').textContent  = flag;
  document.getElementById('trLabel').textContent = label;

  // Update active state
  document.querySelectorAll('.tr-opt').forEach(function(o){ o.classList.remove('sel'); });
  el.classList.add('sel');

  // Close menu
  trOpen = false;
  document.getElementById('trMenu').classList.remove('open');

  if(lang === 'en'){
    // Restore English — use GT widget to reset
    triggerGT('en');
    // Also reload iframe in original language
    var fr = document.getElementById('moduleFrame');
    var src = fr.src;
    fr.src = '';
    setTimeout(function(){ fr.src = src; }, 50);
    return;
  }

  // 1. Translate the player chrome via GT widget
  triggerGT(lang);

  // 2. Translate the iframe content by reloading it through GT translate URL
  //    This works because it's same-domain — GT can wrap it
  var fr = document.getElementById('moduleFrame');
  var rawSrc = fr.getAttribute('data-original-src') || fr.src;
  fr.setAttribute('data-original-src', rawSrc);

  // Build absolute URL for the module file
  var base = window.location.origin + window.location.pathname.replace('player.html','');
  var moduleFile = rawSrc.startsWith('http') ? rawSrc : base + rawSrc;

  // Use Google Translate's public translate URL — wraps any page
  var gtUrl = 'https://translate.google.com/translate?sl=en&tl=' + lang +
              '&hl=en&u=' + encodeURIComponent(moduleFile) +
              '&sandbox=1';
  fr.src = gtUrl;
}

function triggerGT(lang){
  // Try multiple times as GT widget loads async
  var attempts = 0;
  function tryIt(){
    var sel = document.querySelector('.goog-te-combo');
    if(sel){
      sel.value = lang;
      sel.dispatchEvent(new Event('change'));
    } else if(attempts++ < 20){
      setTimeout(tryIt, 300);
    }
  }
  tryIt();
}

// When a new module loads, re-apply current language to its iframe
var _origLoadModule = typeof loadModule === 'function' ? loadModule : null;
document.addEventListener('DOMContentLoaded', function(){
  // Patch loadModule to re-translate after loading
  var origFn = window.loadModule;
  if(origFn){
    window.loadModule = function(id){
      origFn(id);
      if(activeLang !== 'en'){
        // Wait for iframe src to be set then translate
        setTimeout(function(){
          var fr = document.getElementById('moduleFrame');
          fr.removeAttribute('data-original-src');
          var src = fr.src;
          if(src){
            var base = window.location.origin + window.location.pathname.replace('player.html','');
            var moduleFile = src.startsWith('http') ? src : base + src;
            fr.src = 'https://translate.google.com/translate?sl=en&tl=' + activeLang +
                     '&hl=en&u=' + encodeURIComponent(moduleFile) + '&sandbox=1';
          }
        }, 800);
      }
    };
  }
});
</script>

</body>
</html>
