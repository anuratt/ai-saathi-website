<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Saathi — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Firebase scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
:root{
  --brand:#D4500A;
  --brand-warm:#E8611A;
  --brand-deep:#A83A06;
  --brand-glow:rgba(232,97,26,0.35);
  --gold:#F0A500;
  --gold-light:#FFD166;
  --ink:#0E0D12;
  --ink2:#1C1B24;
  --body:#3D3B50;
  --muted:#888599;
  --pale:#F7F6F2;
  --white:#FFFFFF;
  --border:rgba(0,0,0,0.08);
  --r:18px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--pale); color: var(--body); display: flex; align-items: center; justify-content: center; min-height: 100vh; position: relative; }
.auth-container { background: white; border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 16px 56px rgba(14,13,18,0.08); border: 1px solid var(--border); margin: 20px; }
.logo { font-family: 'Fraunces', serif; font-weight: 900; font-size: 28px; background: linear-gradient(135deg, var(--gold-light), var(--brand-warm)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; margin-bottom: 8px; }
.subtitle { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 32px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 8px; }
.form-group input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; font-family: 'Plus Jakarta Sans', sans-serif; outline: none; transition: border-color 0.2s; }
.form-group input:focus { border-color: var(--brand-warm); }
.btn-submit { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--brand-warm), var(--brand-deep)); color: white; font-size: 16px; font-weight: 800; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; box-shadow: 0 8px 24px var(--brand-glow); font-family: 'Plus Jakarta Sans', sans-serif; }
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 32px var(--brand-glow); }
.btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
.toggle-mode { text-align: center; margin-top: 24px; font-size: 14px; color: var(--muted); }
.toggle-mode a { color: var(--brand-warm); font-weight: 700; cursor: pointer; text-decoration: none; }
.error-msg { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; display: none; text-align: center; }
.back-home { position: absolute; top: 24px; left: 24px; color: var(--muted); text-decoration: none; font-size: 14px; font-weight: 600; transition: color 0.2s; }
.back-home:hover { color: var(--ink); }
@media (max-width: 480px) {
  .auth-container { padding: 32px 24px; }
  .back-home { top: 16px; left: 16px; }
}
</style>
</head>
<body>
  <a href="index.html" class="back-home">← Back to Home</a>
  <div class="auth-container">
    <div class="logo">AI Saathi</div>
    <div class="subtitle" id="formSubtitle">Login to your account</div>
    
    <div class="error-msg" id="errorMsg"></div>
    
    <form id="authForm">
      <div class="form-group" id="nameGroup" style="display:none;">
        <label>Full Name</label>
        <input type="text" id="nameInput" placeholder="Ram Bahadur">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="emailInput" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="passwordInput" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Login</button>
    </form>
    
    <div class="toggle-mode">
      <span id="toggleText">Don't have an account?</span>
      <a id="toggleLink" onclick="toggleAuthMode()">Sign up</a>
    </div>
  </div>

  <script>
    let isSignup = false;
    let redirecting = false;
    
    // If user is already logged in, redirect to dashboard
    window.auth.onAuthStateChanged((user) => {
      if(user && !redirecting) {
        redirecting = true;
        window.location.href = 'dashboard.html';
      }
    });

    function toggleAuthMode() {
      isSignup = !isSignup;
      document.getElementById('nameGroup').style.display = isSignup ? 'block' : 'none';
      if(isSignup) {
        document.getElementById('nameInput').setAttribute('required', 'required');
      } else {
        document.getElementById('nameInput').removeAttribute('required');
      }
      document.getElementById('formSubtitle').innerText = isSignup ? 'Create a new account' : 'Login to your account';
      document.getElementById('submitBtn').innerText = isSignup ? 'Sign Up' : 'Login';
      document.getElementById('toggleText').innerText = isSignup ? 'Already have an account?' : 'Don\'t have an account?';
      document.getElementById('toggleLink').innerText = isSignup ? 'Login' : 'Sign up';
      document.getElementById('errorMsg').style.display = 'none';
    }

    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value.trim();
      const name = document.getElementById('nameInput').value.trim();
      const btn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');
      
      btn.disabled = true;
      errorMsg.style.display = 'none';

      try {
        if (isSignup) {
          const userCred = await window.auth.createUserWithEmailAndPassword(email, password);
          await userCred.user.updateProfile({ displayName: name });
          // Create user doc
          await window.db.collection('users').doc(userCred.user.uid).set({
            name: name,
            email: email,
            hasPaid: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          // State changed listener will redirect to dashboard
        } else {
          await window.auth.signInWithEmailAndPassword(email, password);
          // State changed listener will redirect to dashboard
        }
      } catch (error) {
        console.error(error);
        
        // Make firebase errors more user-friendly
        let displayError = error.message;
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          displayError = 'Invalid email or password.';
        } else if (error.code === 'auth/email-already-in-use') {
          displayError = 'An account with this email already exists.';
        } else if (error.code === 'auth/weak-password') {
          displayError = 'Password should be at least 6 characters.';
        }
        
        errorMsg.innerText = displayError;
        errorMsg.style.display = 'block';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
